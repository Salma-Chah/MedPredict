version: "3.9"

services:

  mlflow:
    build: ./mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
    volumes:
      - ./mlruns:/app/mlruns
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  # Service d'entraînement — lancé manuellement uniquement :
  #   docker-compose --profile train run --rm train
  train:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: python -m src.train
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    depends_on:
      - mlflow
    profiles:
      - train